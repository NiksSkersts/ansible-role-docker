---

- name: "DOCKER VM: Configure base"
  ansible.builtin.include_role:
    name: geerlingguy.docker
  vars:
    docker_packages:
      - "docker-{{ docker_edition }}"
      - "docker-{{ docker_edition }}-cli"
      - "docker-{{ docker_edition }}-rootless-extras"
    docker_edition: 'ce'
    docker_packages_state: present
    docker_users:
      - zabbix  # Add zabbix user to allow Zabbix agent2 to monitor it.

- name: Get host info
  community.docker.docker_host_info:
    containers: true
    images: true
  register: docker_info

- name: Remove all containers and their volumes
  when: wipe
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
    keep_volumes: false
  loop: "{{ docker_info.containers | map(attribute='Id') }}"

- name: Remove all images
  when: wipe
  community.docker.docker_image:
    name: "{{ item }}"
    state: absent
    force_absent: true
  loop: "{{ docker_info.images | map(attribute='Id') }}"

- name: Deploy Docker containers
  loop: "{{ docker_defs }}"
  when: docker_defs | length > 0
  ansible.builtin.include_tasks: "deploy_docker_container.yml"
